name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read
  id-token: write
  statuses: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run three-tier PR review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/pr_review.py

      - name: Set commit status from review verdict
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const prNumber = pr.number;

            const SUMMARY_HEADER = '## PR Review Summary';
            const CLEAN_PATTERN = /verdict[^\n]*✅ Looks good/i;

            const reviewRan = '${{ steps.review.outcome }}' === 'success';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
              sort: 'created',
              direction: 'desc',
            });

            const summary = reviewRan
              ? comments.find(c => c.user.login === 'github-actions[bot]' &&
                                   c.body.includes(SUMMARY_HEADER))
              : null;

            let statusState, statusDescription;
            if (!reviewRan) {
              statusState = 'error';
              statusDescription = 'Claude review did not run — re-run the workflow';
            } else if (!summary) {
              statusState = 'error';
              statusDescription = 'Claude ran but posted no summary — re-run the workflow';
            } else {
              const isClean = CLEAN_PATTERN.test(summary.body);
              const hasImportant = summary.body.includes('Must fix before merge');
              statusState = (isClean || !hasImportant) ? 'success' : 'failure';
              statusDescription = isClean
                ? 'No findings — good to merge'
                : hasImportant
                  ? 'Important findings must be resolved before merging'
                  : 'Nit findings only — good to merge';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: statusState,
              context: 'claude-review',
              description: statusDescription,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
