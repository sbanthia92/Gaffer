name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: npm ci && npm run build
        working-directory: ui

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ec2-user/gaffer

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing Python dependencies..."
            .venv/bin/pip install -r requirements.txt -q
            .venv/bin/pip install -e . -q

            echo "==> Building React UI..."
            cd ui && npm ci --prefer-offline && npm run build
            sudo cp -r dist/. /var/www/gaffer/
            cd ..

            echo "==> Restarting Gaffer service..."
            sudo systemctl daemon-reload
            sudo systemctl restart gaffer
            sleep 3
            sudo systemctl is-active --quiet gaffer && echo "Service is running." || (sudo journalctl -u gaffer -n 20 && exit 1)

      - name: Setup CloudWatch agent via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=gaffer" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo bash /home/ec2-user/gaffer/scripts/setup_cloudwatch.sh"]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)
          echo "CloudWatch setup status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
