name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build → ECR → EKS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/gaffer-api:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/gaffer-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Rolling deploy to EKS
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/gaffer-api:${{ github.sha }}
        run: |
          kubectl set image deployment/gaffer-api gaffer-api=$IMAGE -n gaffer
          kubectl rollout status deployment/gaffer-api -n gaffer --timeout=300s
