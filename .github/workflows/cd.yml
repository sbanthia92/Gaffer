name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: npm ci && npm run build
        working-directory: ui

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ec2-user/gaffer

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing Python dependencies..."
            .venv/bin/pip install -r requirements.txt -q
            .venv/bin/pip install -e . -q

            echo "==> Building React UI..."
            cd ui && npm ci --prefer-offline && npm run build
            sudo cp -r dist/. /var/www/gaffer/
            cd ..

            echo "==> Restarting Gaffer service..."
            sudo systemctl daemon-reload
            sudo systemctl restart gaffer
            sleep 3
            sudo systemctl is-active --quiet gaffer && echo "Service is running." || (sudo journalctl -u gaffer -n 20 && exit 1)
