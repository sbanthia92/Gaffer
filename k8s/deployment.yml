apiVersion: apps/v1
kind: Deployment
metadata:
  name: gaffer-api
  namespace: gaffer
  labels:
    app: gaffer-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gaffer-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gaffer-api
    spec:
      containers:
        - name: gaffer-api
          image: REGISTRY_PLACEHOLDER/gaffer-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: gaffer-config
            - secretRef:
                name: gaffer-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 30
