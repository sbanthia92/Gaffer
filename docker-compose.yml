services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      # Mount source for hot-reload in development
      - ./server:/app/server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    env_file:
      - .env
    # Only runs when explicitly invoked: docker compose --profile pipeline up pipeline
    profiles:
      - pipeline
